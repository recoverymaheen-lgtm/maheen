<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0F172A,#1E293B,#2563EB);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    padding:30px;
    animation:fadeIn 1s ease;
}

.logo{
    width:120px;
    height:120px;
    border-radius:30px;
    background:#fff;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:55px;
    color:#2563EB;
    font-weight:bold;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
    margin-top:25px;
    font-size:34px;
}

p{
    margin-top:12px;
    color:#dbeafe;
    line-height:1.6;
    font-size:16px;
}

.btn{
    margin-top:35px;
    display:inline-block;
    padding:15px 40px;
    background:#fff;
    color:#2563EB;
    text-decoration:none;
    border-radius:50px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">🏏</div>

    <h1>Welcome</h1>

    <p>
        Enjoy Live Cricket Streaming,<br>
        Live Scores, Match Schedule,<br>
        and Fast Updates.
    </p>

    <a href="home.html" class="btn">Get Started</a>

</div>

</body>
</html>
